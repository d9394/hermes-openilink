name: openilink-platform
label: OpeniLink Hub
kind: platform
version: 1.0.0
description: >
  OpeniLink Hub gateway adapter for Hermes Agent.
  Connects to OpeniLink Hub via WebSocket to send/receive messages.
author: Custom
requires_env:
  - name: OPENILINK_TOKEN
    description: "OpeniLink Hub 的 Bot API 访问凭证 (Token)"
    prompt: "OpeniLink Bot Token"
    url: "https://hub.openilink.com"
    password: true
optional_env:
  - name: OPENILINK_HUB_URL
    description: "OpeniLink Hub 服务的基准 HTTP/HTTPS URL"
    prompt: "OpeniLink Hub URL"
    password: false
  - name: OPENILINK_ALLOW_ALL_USERS
    description: "是否允许任何外部用户触发 Bot（true/false）"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: OPENILINK_HOME_CHANNEL
    description: "默认的定时任务通知投递 Channel ID/Chat ID"
    prompt: "Home channel ID"
    password: false
